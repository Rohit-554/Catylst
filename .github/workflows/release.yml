name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'cli-generator/**'        # only trigger when CLI code changes
      - '.github/workflows/release.yml'

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write             # needed to create GitHub releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('cli-generator/gradle/wrapper/gradle-wrapper.properties', 'cli-generator/**/*.gradle.kts') }}
          restore-keys: gradle-

      - name: Build JAR
        working-directory: cli-generator
        run: ./gradlew jar --no-daemon

      - name: Read version
        id: version
        working-directory: cli-generator
        run: |
          VERSION=$(grep '^version' build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute SHA-256
        id: sha
        run: |
          SHA=$(sha256sum cli-generator/build/libs/cli-generator-*.jar | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Delete existing release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.version.outputs.tag }}" --yes 2>/dev/null || true
          git push origin --delete "${{ steps.version.outputs.tag }}" 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            cli-generator/build/libs/cli-generator-*.jar#catylst-cli.jar \
            --title "Catylst CLI ${{ steps.version.outputs.tag }}" \
            --notes "## Install

          \`\`\`bash
          bash <(curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh)
          \`\`\`

          Or via npm:
          \`\`\`bash
          npm install -g catylst
          \`\`\`

          ## SHA-256 verification
          \`\`\`
          ${{ steps.sha.outputs.sha256 }}  catylst-cli.jar
          \`\`\`
          Verify: \`sha256sum ~/.catylst/catylst-cli.jar\`

          ## What's changed
          ${{ github.event.head_commit.message }}"
